<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>權證篩選系統</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { margin-bottom: 16px; }
        .form-row { margin-bottom: 10px; }
        label { display: inline-block; width: 140px; }
        input, select, button { padding: 6px; margin-right: 8px; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        table, th, td { border: 1px solid #999; }
        th, td { padding: 8px; text-align: center; }
        th { background-color: #f0f0f0; }
    </style>
</head>
<body>
<h1>權證篩選系統</h1>

<div class="form-row">
    <label>標的股票代號</label>
    <input type="text" id="underlyingCode" placeholder="例如 2330">
</div>

<div class="form-row">
    <label>權證類型</label>
    <select id="warrantType">
        <option value="">全部</option>
        <option value="CALL">認購</option>
        <option value="PUT">認售</option>
    </select>
</div>

<div class="form-row">
    <label>到期天數</label>
    <input type="number" id="minDays" placeholder="最小">
    <input type="number" id="maxDays" placeholder="最大">
</div>

<div class="form-row">
    <label>權證價格</label>
    <input type="number" step="0.01" id="minPrice" placeholder="最小">
    <input type="number" step="0.01" id="maxPrice" placeholder="最大">
</div>

<div class="form-row">
    <label>最低成交量</label>
    <input type="number" id="minTradeVolume" placeholder="例如 10000">
</div>

<div class="form-row">
    <label>價內外程度(%)</label>
    <input type="number" step="0.01" id="minMoneyness" placeholder="最小">
    <input type="number" step="0.01" id="maxMoneyness" placeholder="最大">
</div>

<div class="form-row">
    <label>發行券商</label>
    <input type="text" id="issuerName" placeholder="例如 凱基">
</div>

<div class="form-row">
    <label>排序欄位</label>
    <select id="sortBy">
        <option value="score">分數</option>
        <option value="volume">成交量</option>
        <option value="spread">價差</option>
        <option value="days">到期天數</option>
    </select>

    <select id="sortOrder">
        <option value="desc">大到小</option>
        <option value="asc">小到大</option>
    </select>

    <button onclick="search()">查詢</button>
</div>

<table>
    <thead>
    <tr>
        <th>權證代號</th>
        <th>權證名稱</th>
        <th>標的代號</th>
        <th>類型</th>
        <th>券商</th>
        <th>標的價</th>
        <th>權證價</th>
        <th>履約價</th>
        <th>到期天數</th>
        <th>價內外(%)</th>
        <th>成交量</th>
        <th>買價</th>
        <th>賣價</th>
        <th>價差(%)</th>
        <th>分數</th>
    </tr>
    </thead>
    <tbody id="resultBody"></tbody>
</table>

<script>
    async function search() {
        const payload = {
            underlyingCode: document.getElementById("underlyingCode").value,
            warrantType: document.getElementById("warrantType").value,
            minDaysToMaturity: valueOrNull("minDays"),
            maxDaysToMaturity: valueOrNull("maxDays"),
            minPrice: valueOrNull("minPrice"),
            maxPrice: valueOrNull("maxPrice"),
            minTradeVolume: valueOrNull("minTradeVolume"),
            minMoneynessPercent: valueOrNull("minMoneyness"),
            maxMoneynessPercent: valueOrNull("maxMoneyness"),
            issuerName: document.getElementById("issuerName").value,
            sortBy: document.getElementById("sortBy").value,
            sortOrder: document.getElementById("sortOrder").value
        };

        const res = await fetch("/api/screener/warrants/search", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(payload)
        });

        const data = await res.json();
        renderTable(data);
    }

    function valueOrNull(id) {
        const val = document.getElementById(id).value;
        return val === "" ? null : Number(val);
    }

    function renderTable(data) {
        const tbody = document.getElementById("resultBody");
        tbody.innerHTML = "";

        data.forEach(item => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${item.warrantCode ?? ""}</td>
                <td>${item.warrantName ?? ""}</td>
                <td>${item.underlyingCode ?? ""}</td>
                <td>${item.warrantType ?? ""}</td>
                <td>${item.issuerName ?? ""}</td>
                <td>${item.underlyingClosePrice ?? ""}</td>
                <td>${item.warrantClosePrice ?? ""}</td>
                <td>${item.strikePrice ?? ""}</td>
                <td>${item.daysToMaturity ?? ""}</td>
                <td>${item.moneynessPercent ?? ""}</td>
                <td>${item.tradeVolume ?? ""}</td>
                <td>${item.bidPrice ?? ""}</td>
                <td>${item.askPrice ?? ""}</td>
                <td>${item.spreadPercent ?? ""}</td>
                <td>${item.score ?? ""}</td>
            `;
            tbody.appendChild(tr);
        });
    }
</script>
</body>
</html>
