spring.application.name=stock
server.port=8080

spring.datasource.url=jdbc:mariadb://127.0.0.1:3306/stock?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Taipei
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Taipei

spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

logging.level.root=INFO
logging.level.tool.stock=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=INFO

app.twse.base-url=https://openapi.twse.com.tw/v1
app.strategy.code=V8_BREAKOUT
