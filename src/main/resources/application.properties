spring.application.name=stock-v8-sniper
server.port=8080

spring.datasource.url=jdbc:mariadb://127.0.0.1:3306/stock_v8_sniper?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Taipei
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Taipei

spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML

logging.level.root=INFO
logging.level.tool.stock=INFO

app.import.mode=API_AND_FILE
app.data.root=./data
app.twse.base-url=https://openapi.twse.com.tw/v1
app.twse.daily-quote-endpoint=/exchangeReport/STOCK_DAY_ALL
app.twse.valuation-endpoint=/exchangeReport/BWIBBU_ALL
app.twse.stock-basic-endpoint=/opendata/t187ap03_L
app.twse.chip-endpoint=/fund/T86
app.strategy.v8.strategy-name=V8.0 狙擊主力籌碼突破版
app.strategy.v8.min-price=10
app.strategy.v8.min-volume=500000
app.strategy.v8.min-pct-change=4.0
app.strategy.v8.volume.shrink-days=5
app.strategy.v8.volume.breakout-days-5=5
app.strategy.v8.volume.breakout-days-10=10
app.strategy.v8.volume.breakout-multiplier-5=2.0
app.strategy.v8.volume.breakout-multiplier-10=1.5
app.strategy.v8.ma.mode=PRICE_OVER_MULTI_MA
app.strategy.v8.trend.mode=REGRESSION
app.strategy.v8.trend.lookback-days=20
app.strategy.v8.buy-price.mode=CLOSE_DISCOUNT
app.strategy.v8.buy-price.discount-rate=0.97
app.strategy.v8.score.weight-volume-breakout=30
app.strategy.v8.score.weight-ma-breakout=25
app.strategy.v8.score.weight-trend-breakout=25
app.strategy.v8.score.weight-pct-strength=10
app.strategy.v8.score.weight-volume-threshold=10
