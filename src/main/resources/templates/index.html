<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>stock-v8-sniper</title>
    <style>
        body { font-family: Arial, "Microsoft JhengHei", sans-serif; margin: 20px; }
        .toolbar, .panel { margin-bottom: 16px; padding: 12px; border: 1px solid #ccc; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; font-size: 14px; }
        th { background: #f5f5f5; }
        .left { text-align: left; }
    </style>
</head>
<body>
<h1>V8.0 狙擊主力籌碼突破版</h1>
<div class="toolbar">
    <label>日期 <input type="date" id="tradeDate"></label>
    <label>評價
        <select id="ratingFilter">
            <option value="">全部</option>
            <option value="親股雞形">親股雞形</option>
            <option value="強勢突破">強勢突破</option>
            <option value="觀察名單">觀察名單</option>
        </select>
    </label>
    <button onclick="importDaily()">1. 匯入</button>
    <button onclick="runStrategy()">2. 執行選股</button>
    <button onclick="loadResults()">3. 查詢結果</button>
    <button onclick="exportCsv()">4. 開啟 CSV</button>
</div>
<div class="panel">
    <label>股票代號查歷史 <input type="text" id="stockCode" placeholder="2330"></label>
    <button onclick="loadHistory()">查詢歷史入選紀錄</button>
    <div id="status">尚未執行。</div>
</div>
<table>
    <thead>
    <tr>
        <th>代碼</th><th>名稱</th><th>產業</th><th>總分</th><th>股價</th><th>漲幅%</th><th>成交量</th><th>量比(vs均量)</th><th>趨勢斜率</th><th>建議買入</th><th>選股理由</th><th>評價</th>
    </tr>
    </thead>
    <tbody id="tbody"></tbody>
</table>
<script>
    const dateInput = document.getElementById('tradeDate');
    dateInput.value = new Date().toISOString().slice(0, 10);
    let currentRows = [];
    function setStatus(msg) { document.getElementById('status').innerText = msg; }
    async function importDaily() {
        const res = await fetch(`/api/import/twse/daily?date=${dateInput.value}`); const data = await res.json();
        setStatus('匯入完成：' + JSON.stringify(data.data));
    }
    async function runStrategy() {
        const res = await fetch(`/api/strategy/run?v=8&date=${dateInput.value}`); const data = await res.json();
        setStatus('選股完成：' + JSON.stringify(data.data)); loadResults();
    }
    async function loadResults() {
        const res = await fetch(`/api/strategy/results?date=${dateInput.value}`); const data = await res.json();
        currentRows = (data.data || []).sort((a,b)=>b.totalScore-a.totalScore); render();
        setStatus(`查詢完成，共 ${currentRows.length} 筆。`);
    }
    async function loadHistory() {
        const code = document.getElementById('stockCode').value.trim();
        const res = await fetch(`/api/strategy/history?stockCode=${code}`); const data = await res.json();
        currentRows = data.data || []; render(); setStatus(`歷史入選 ${currentRows.length} 筆。`);
    }
    function render() {
        const rating = document.getElementById('ratingFilter').value;
        const rows = currentRows.filter(x => !rating || x.rating === rating);
        const tbody = document.getElementById('tbody'); tbody.innerHTML = '';
        rows.forEach(x => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${x.stockCode||''}</td><td>${x.stockName||''}</td><td>${x.industry||''}</td><td>${x.totalScore||''}</td><td>${x.closePrice||''}</td><td>${x.pctChange||''}</td><td>${x.volume||''}</td><td>${x.volumeRatio||''}</td><td>${x.trendSlope||''}</td><td>${x.suggestedBuyPrice||''}</td><td class="left">${x.pickReason||''}</td><td>${x.rating||''}</td>`;
            tbody.appendChild(tr);
        });
    }
    document.getElementById('ratingFilter').addEventListener('change', render);
    function exportCsv() { window.open(`/api/strategy/export?date=${dateInput.value}`, '_blank'); }
</script>
</body>
</html>
