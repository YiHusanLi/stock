<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>V8_BREAKOUT 台股 / ETF 起漲選股系統</title>
    <style>
        body { font-family: Arial, "Microsoft JhengHei", sans-serif; margin: 20px; }
        h1 { margin-bottom: 8px; }
        .panel { margin-bottom: 16px; padding: 12px; border: 1px solid #ccc; border-radius: 6px; }
        label { margin-right: 8px; }
        input, button { padding: 6px 10px; margin-right: 8px; }
        table { border-collapse: collapse; width: 100%; margin-top: 16px; }
        th, td { border: 1px solid #bbb; padding: 8px; text-align: center; font-size: 14px; }
        th { background: #f3f3f3; }
        .left { text-align: left; }
        #status { color: #333; margin-top: 8px; }
    </style>
</head>
<body>
<h1>V8_BREAKOUT 台股 / ETF 起漲選股系統</h1>
<p>流程建議：先匯入日線 → 再計算指標 → 再掃描指定日期訊號。</p>
<p>
    <a href="/">起漲選股首頁</a> |
    <a href="/warrant-screener.html">權證篩選頁</a>
</p>

<div class="panel">
    <label for="tradeDate">日期</label>
    <input type="date" id="tradeDate">
    <button onclick="importDaily()">1. 匯入 TWSE 日線</button>
    <button onclick="calculateIndicator()">2. 計算指標</button>
    <button onclick="scanSignal()">3. 掃描訊號</button>
    <button onclick="loadSignals()">4. 查詢訊號</button>
    <div id="status">尚未執行。</div>
</div>

<table>
    <thead>
    <tr>
        <th>股票代號</th>
        <th>股票名稱</th>
        <th>日期</th>
        <th>收盤價</th>
        <th>漲幅%</th>
        <th>成交量</th>
        <th>MA5</th>
        <th>MA10</th>
        <th>MA20</th>
        <th>是否量縮後爆量</th>
        <th>是否一線穿三線</th>
        <th>是否突破下降趨勢</th>
        <th class="left">備註</th>
    </tr>
    </thead>
    <tbody id="resultBody"></tbody>
</table>

<script>
    const tradeDateInput = document.getElementById('tradeDate');
    tradeDateInput.value = new Date().toISOString().slice(0, 10);

    function setStatus(message) {
        document.getElementById('status').innerText = message;
    }

    async function postJson(url, payload) {
        const response = await fetch(url, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        return response.json();
    }

    async function importDaily() {
        const data = await postJson('/api/import/twse/daily', {tradeDate: tradeDateInput.value});
        setStatus('匯入完成，筆數：' + data.data);
    }

    async function calculateIndicator() {
        const data = await postJson('/api/indicator/calculate', {tradeDate: tradeDateInput.value});
        setStatus('指標計算完成，筆數：' + data.data);
    }

    async function scanSignal() {
        const response = await fetch('/api/strategy/v8/scan?date=' + tradeDateInput.value, {method: 'POST'});
        const data = await response.json();
        setStatus('掃描完成，訊號數：' + data.data);
    }

    async function loadSignals() {
        const response = await fetch('/api/strategy/v8/signals?date=' + tradeDateInput.value);
        const data = await response.json();
        renderTable(data.data || []);
        setStatus('查詢完成，訊號數：' + ((data.data || []).length));
    }

    function renderTable(rows) {
        const tbody = document.getElementById('resultBody');
        tbody.innerHTML = '';
        rows.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.stockCode ?? ''}</td>
                <td>${item.stockName ?? ''}</td>
                <td>${item.tradeDate ?? ''}</td>
                <td>${fmt(item.closePrice)}</td>
                <td>${fmt(item.pctChange)}</td>
                <td>${fmt(item.volume)}</td>
                <td>${fmt(item.ma5)}</td>
                <td>${fmt(item.ma10)}</td>
                <td>${fmt(item.ma20)}</td>
                <td>${booleanText(item.squeezeBurst)}</td>
                <td>${booleanText(item.multiMaBreak)}</td>
                <td>${booleanText(item.trendBreak)}</td>
                <td class="left">${item.remark ?? ''}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function fmt(value) {
        if (value === null || value === undefined) {
            return '';
        }
        return value;
    }

    function booleanText(value) {
        return value ? '是' : '否';
    }
</script>
</body>
</html>
